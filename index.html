<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <title>Come Over · BTS — Lyric Player</title>
  </head>
  <body>
    <div id="root">
      <!-- Boot fallback + self-diagnostic. React replaces this on mount.
           If the bundle 404s, throws, or never runs, the inline script below
           captures the error and surfaces it on screen instead of leaving the
           user stuck on a blank "Loading…". -->
      <div
        id="boot-fallback"
        style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:#020617;color:#fcd34d;font-family:system-ui,-apple-system,sans-serif;text-align:center;padding:24px"
      >
        <div style="font-size:18px;font-weight:700;letter-spacing:0.05em">Come Over</div>
        <div id="boot-status" style="font-size:12px;color:#94a3b8">Loading…</div>
        <pre
          id="boot-diag"
          style="margin:8px 0 0;max-width:90vw;color:#fca5a5;font-size:11px;white-space:pre-wrap;overflow-wrap:anywhere;text-align:left;line-height:1.45"
        ></pre>
      </div>
    </div>
    <script>
      (function () {
        var diag = function (msg) {
          var el = document.getElementById('boot-diag');
          if (!el) return;
          el.textContent = (el.textContent ? el.textContent + '\n' : '') + msg;
        };
        var setStatus = function (s) {
          var el = document.getElementById('boot-status');
          if (el) el.textContent = s;
        };
        window.addEventListener(
          'error',
          function (e) {
            var src = (e.target && (e.target.src || e.target.href)) || e.filename || '';
            var msg = e.message || (e.target && e.target.tagName ? e.target.tagName + ' failed to load' : 'error');
            setStatus('Boot failed');
            diag(msg + (src ? '\n→ ' + src : ''));
          },
          true,
        );
        window.addEventListener('unhandledrejection', function (e) {
          setStatus('Boot failed');
          var r = e.reason;
          diag('Promise rejected: ' + ((r && (r.message || r.toString())) || 'unknown'));
        });
        setTimeout(function () {
          if (document.getElementById('boot-fallback')) {
            setStatus('Stuck after 5s');
            diag('App bundle did not execute within 5 seconds.');
          }
        }, 5000);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
