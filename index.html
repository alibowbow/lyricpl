<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <title>Come Over · BTS — Lyric Player</title>
  </head>
  <body>
    <div id="root">
      <!-- Boot fallback: shown until React mounts and replaces #root's
           contents. If the app script fails to load/run, this stays visible
           instead of a blank white page — a hint that the page loaded but the
           bundle didn't execute. -->
      <div
        id="boot-fallback"
        style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:#020617;color:#fcd34d;font-family:system-ui,-apple-system,sans-serif;text-align:center;padding:24px"
      >
        <div style="font-size:18px;font-weight:700;letter-spacing:0.05em">Come Over</div>
        <div style="font-size:12px;color:#94a3b8">Loading…</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
